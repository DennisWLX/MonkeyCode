version: '3.8'

services:
  # ===========================================
  # Orchestrator - AI 代码编排器
  # ===========================================
  orchestrator:
    image: ghcr.io/chaitin/monkeycode/orchestrator:latest
    container_name: monkeycode_runner_orchestrator
    restart: unless-stopped
    environment:
      - TOKEN=${TOKEN}
      - GRPC_HOST=${GRPC_HOST}
      - GRPC_PORT=${GRPC_PORT}
      - GRPC_URL=${GRPC_URL}
      - HOST_ID=${HOST_ID}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_CORES=${MAX_CORES:-8}
      - MAX_MEMORY=${MAX_MEMORY:-16384}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - orchestrator_data:/data
    networks:
      - monkeycode_runner_network
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  monkeycode_runner_network:
    name: monkeycode_runner_network
    driver: bridge

volumes:
  orchestrator_data:
    name: monkeycode_runner_data
