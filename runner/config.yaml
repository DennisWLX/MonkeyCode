# MonkeyCode Runner 配置
# 注意：主要通过环境变量配置，此文件仅供参考

# 认证令牌（必需）
# 在 Docker 环境中通过 -e TOKEN=xxx 传入
token: "${TOKEN}"

# TaskFlow gRPC 服务地址
# 默认: localhost:50051
grpc_addr: "${GRPC_URL:-localhost:50051}"

# 日志级别
# 可选值: debug, info, warn, error
# 默认: info
log_level: "${LOG_LEVEL:-info}"

# HTTP 服务地址
# 默认: :8080
http_addr: "${HTTP_ADDR:-:8080}"

# 数据目录
# 用于存储任务数据、缓存等
data_dir: "${DATA_DIR:-/app/data}"

# Docker 配置
docker:
  # 默认容器镜像
  default_image: "ubuntu:22.04"

  # 容器网络
  network: "bridge"

  # 资源限制
  resources:
    # 默认 CPU 核心数
    cores: 8

    # 默认内存 (MB)
    memory: 16384

    # 默认磁盘空间 (GB)
    disk: 100

# Runner 配置
runner:
  # 心跳间隔 (秒)
  heartbeat_interval: 10

  # 心跳超时 (秒)
  heartbeat_timeout: 60

  # 最大并发任务数
  max_concurrent_tasks: 100

  # 工作目录
  work_dir: "/workspace"
